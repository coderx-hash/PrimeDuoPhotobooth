<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME DUO PHOTOBOOTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800;900&display=swap" rel="stylesheet">
    <style>
        /* RESET & GLOBALS */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { 
            background: #050505; 
            color: #fff; 
            overflow: hidden; /* No scrolling */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }

        /* SCREEN MANAGER */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease;
            transform: scale(0.98);
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            z-index: 10;
        }

        /* 1. INTRO SCREEN */
        #introScreen {
            background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%);
        }
        .brand-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseGlow 3s infinite alternate;
        }
        .brand-title span { display: block; font-size: 2.5rem; font-weight: 300; letter-spacing: 15px; color: #fff; -webkit-text-fill-color: #fff; margin-top: -10px;}
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 20px rgba(255,255,255,0.1); }
            100% { text-shadow: 0 0 40px rgba(255,255,255,0.4), 0 0 10px rgba(255,255,255,0.2); }
        }
        .start-btn {
            background: #ffffff;
            color: #000;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }
        .start-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,255,255,0.4); }

        /* 2. SETUP SCREEN (Border Selection) */
        #setupScreen h2 { font-size: 3rem; font-weight: 800; margin-bottom: 3rem; text-transform: uppercase; }
        .setup-options { display: flex; gap: 30px; }
        .choice-card {
            background: #111;
            border: 2px solid #333;
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            width: 300px;
            transition: 0.3s;
        }
        .choice-card:hover { border-color: #fff; background: #1a1a1a; transform: translateY(-5px); }
        .choice-card h3 { font-size: 1.8rem; margin-bottom: 10px; }
        .choice-card p { color: #888; font-size: 0.9rem; }
        input[type="file"] { display: none; }
        #proceedBtn { margin-top: 40px; display: none; } /* Hidden until choice is made */

        /* 3. BOOTH SCREEN (Live Camera) */
        .booth-container {
            display: flex;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
        }
        .camera-wrapper {
            position: relative;
            height: 85vh;
            aspect-ratio: 9 / 16;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-size: 100% 100%; }
        .countdown-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; font-weight: 900; color: white; text-shadow: 0 10px 40px rgba(0,0,0,0.9); display: none; z-index: 15; }
        .flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; opacity: 0; z-index: 20; pointer-events: none; }
        .flash.active { animation: flashAnim 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .booth-controls { display: flex; flex-direction: column; gap: 20px; max-width: 350px; }
        .status-text { color: #00ff00; font-weight: 600; letter-spacing: 1px; font-size: 0.9rem;}

        /* 4. RESULT SCREEN */
        #resultScreen { text-align: center; }
        .success-icon { font-size: 5rem; margin-bottom: 20px; }
        #resultScreen h2 { font-size: 4rem; font-weight: 900; margin-bottom: 10px; }
        #resultScreen p { font-size: 1.2rem; color: #aaa; margin-bottom: 40px; }
        
        /* HIDDEN CANVAS */
        #canvas { display: none; }
    </style>
</head>
<body>

    <div id="introScreen" class="screen active">
        <h1 class="brand-title">PRIME DUO<span>PHOTOBOOTH</span></h1>
        <button class="start-btn" onclick="initCameraAndProceed()">Tap to Start</button>
    </div>

    <div id="setupScreen" class="screen">
        <h2>Choose Your Style</h2>
        <div class="setup-options">
            <div class="choice-card" onclick="selectBorder('none')">
                <h3>No Border</h3>
                <p>Clean, full-resolution portrait.</p>
            </div>
            
            <label for="frameUpload" class="choice-card">
                <h3>Upload Border</h3>
                <p>Add your custom PNG frame.</p>
            </label>
            <input type="file" id="frameUpload" accept="image/png">
        </div>
        <button id="proceedBtn" class="start-btn" onclick="goToBooth()">Proceed to Camera ➔</button>
    </div>

    <div id="boothScreen" class="screen">
        <div class="booth-container">
            <div class="booth-controls">
                <h1 style="font-size: 2.5rem; font-weight: 900; line-height: 1;">PRIME DUO</h1>
                <p class="status-text" id="cameraStatus">Initializing...</p>
                <p style="color: #888; margin-bottom: 20px; font-size: 0.9rem;">Look at the camera and pose when the timer hits zero.</p>
                <button id="captureBtn" class="start-btn" style="width: 100%; padding: 25px;">📷 Start Timer</button>
            </div>

            <div class="camera-wrapper">
                <video id="video" autoplay playsinline></video>
                <div id="frameOverlay" class="frame-overlay"></div>
                <div id="countdown" class="countdown-display"></div>
                <div id="flashEffect" class="flash"></div>
            </div>
        </div>
    </div>

    <div id="resultScreen" class="screen">
        <div class="success-icon">✨📸✨</div>
        <h2>Photo Saved!</h2>
        <p>Check your computer's download folder for the high-res copy.</p>
        <button class="start-btn" onclick="startNewSession()">🔄 New Session</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // DOM Elements
        const video = document.getElementById('video');
        const frameOverlay = document.getElementById('frameOverlay');
        const frameUpload = document.getElementById('frameUpload');
        const captureBtn = document.getElementById('captureBtn');
        const countdownEl = document.getElementById('countdown');
        const flashEffect = document.getElementById('flashEffect');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cameraStatus = document.getElementById('cameraStatus');
        const proceedBtn = document.getElementById('proceedBtn');

        let uploadedFrameData = null; 
        let isNikonConnected = false;

        // --- NAVIGATION LOGIC ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- STEP 1: INITIALIZE CAMERA (Triggers on "Tap to Start") ---
        async function initCameraAndProceed() {
            try {
                const streamConfig = await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                let selectedDeviceId = null;
                for (let device of videoDevices) {
                    const label = device.label.toLowerCase();
                    if (label.includes('usb video') || label.includes('nikon') || label.includes('capture')) {
                        selectedDeviceId = device.deviceId;
                        isNikonConnected = true;
                        break;
                    }
                }

                let constraints = isNikonConnected 
                    ? { video: { deviceId: { exact: selectedDeviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } } }
                    : { video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } } };

                cameraStatus.innerText = isNikonConnected ? "PRO MODE: NIKON DSLR ACTIVE" : "MOBILE MODE: BUILT-IN CAM ACTIVE";
                cameraStatus.style.color = isNikonConnected ? "#00ff00" : "#ffaa00";

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                // Move to Setup Screen
                showScreen('setupScreen');

            } catch (err) {
                alert("Camera access required to use the photobooth.");
            }
        }

        // --- STEP 2: SETUP BORDER ---
        function selectBorder(type) {
            if (type === 'none') {
                uploadedFrameData = null;
                frameOverlay.style.backgroundImage = 'none';
                document.querySelectorAll('.choice-card').forEach(c => c.style.borderColor = '#333');
                proceedBtn.style.display = 'block';
            }
        }

        frameUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'image/png') {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedFrameData = event.target.result;
                    frameOverlay.style.backgroundImage = `url('${uploadedFrameData}')`;
                    proceedBtn.style.display = 'block'; // Show proceed button
                };
                reader.readAsDataURL(file);
            }
            e.target.value = ''; 
        });

        function goToBooth() {
            showScreen('boothScreen');
        }

        // --- STEP 3: TIMER & CAPTURE ---
        captureBtn.addEventListener('click', () => {
            captureBtn.disabled = true;
            let timeLeft = 5;

            countdownEl.style.display = 'block';
            countdownEl.innerText = timeLeft;

            const timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    countdownEl.innerText = timeLeft;
                } else {
                    clearInterval(timerInterval);
                    countdownEl.style.display = 'none';
                    
                    if (isNikonConnected) triggerNodeJSCamera();
                    else triggerMobileCapture();
                }
            }, 1000);
        });

        async function triggerNodeJSCamera() {
            try {
                const response = await fetch('http://localhost:3000/trigger-camera');
                const data = await response.json();
                if (data.success) playFlashAndSave(500);
                else playFlashAndSave(0);
            } catch (error) {
                playFlashAndSave(0);
            }
        }

        function triggerMobileCapture() {
            playFlashAndSave(0);
        }

        function playFlashAndSave(delay) {
            flashEffect.classList.remove('active');
            void flashEffect.offsetWidth; 
            flashEffect.classList.add('active');

            setTimeout(() => {
                processAndSaveImage();
            }, delay);
        }

        // --- STEP 4: PROCESS, SAVE, AND RESULT SCREEN ---
        function processAndSaveImage() {
            const targetRatio = 9 / 16;
            let srcWidth = video.videoWidth;
            let srcHeight = video.videoHeight;
            let drawWidth = srcHeight * targetRatio;
            let startX = (srcWidth - drawWidth) / 2;

            canvas.width = drawWidth;
            canvas.height = srcHeight;

            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, startX, 0, drawWidth, srcHeight, 0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            if (uploadedFrameData) {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    executeDownload();
                };
                img.src = uploadedFrameData;
            } else {
                executeDownload();
            }
        }

        function executeDownload() {
            const dataURL = canvas.toDataURL('image/jpeg', 1.0);
            const link = document.createElement('a');
            link.download = `PrimeDuo_${new Date().getTime()}.jpg`;
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Move to Final Result Screen
            showScreen('resultScreen');
            captureBtn.disabled = false;
        }

        // --- STEP 5: NEW SESSION ---
        function startNewSession() {
            // Reset configurations
            uploadedFrameData = null;
            frameOverlay.style.backgroundImage = 'none';
            proceedBtn.style.display = 'none';
            
            // Go back to Setup Screen (or IntroScreen kung gusto mong pinaka-umpisa)
            showScreen('setupScreen');
        }

    </script>
</body>
</html>
